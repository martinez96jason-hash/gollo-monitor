name: Monitor de rebajas Gollo

on:
  schedule:
    # Corre cada 15 minutos. GitHub puede retrasar unos minutos en horas pico,
    # es normal y no afecta el funcionamiento.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña "Actions"

jobs:
  check-deals:
    runs-on: ubuntu-latest
    concurrency:
      group: gollo-monitor
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: martinez96jason@gmail.com
        run: python scraper.py

      - name: Guardar estado actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Actualizar estado [skip ci]"
          git push
